<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinger Demo — Axyztem</title>
<link rel="stylesheet" href="css/dinger-demo.css">
</head>
<body>

<header class="navbar">
<img src="photos/axyztem-logo.png" class="logo">
<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="dashboard">
<h1>Dinger Restaurant Dashboard Demo</h1>

<div class="pages">
<button onclick="showPage('preparing')">PREPARING</button>
<button onclick="showPage('ready')">READY</button>
<button onclick="showPage('completed')">COMPLETED</button>
</div>

<div class="ticket-input">
<input type="text" id="ticket-number" placeholder="Enter ticket number">
<button id="ring-btn" disabled onclick="ringTicket()">RING</button>
</div>

<div class="ticket-lists">
<div id="preparing" class="ticket-list active">
<h2>PREPARING (Blue)</h2>
<ul id="preparing-list"></ul>
</div>

<div id="ready" class="ticket-list">
<h2>READY (Green/Red)</h2>
<ul id="ready-list"></ul>
</div>

<div id="completed" class="ticket-list">
<h2>COMPLETED (Yellow)</h2>
<ul id="completed-list"></ul>
</div>
</div>

</section>

<script src="js/dinger-demo.js"></script>
</body>
</html>
